<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Output Scanner</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; line-height: 1.5; }
        .device-list { margin-top: 1rem; border-top: 1px solid #ccc; padding-top: 1rem; }
        .device-item { background: #f4f4f4; margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 4px; }
        button { padding: 0.5rem 1rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>Connected Audio Outputs</h2>
    <p>Click the button below to list all connected speakers/audio output devices.</p>
    
    <button id="scanBtn">Scan for Speakers</button>

    <div id="output" class="device-list"></div>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const output = document.getElementById('output');

        scanBtn.addEventListener('click', async () => {
            try {
                // Requesting permissions ensures we get the actual labels/names
                // instead of empty strings.
                await navigator.mediaDevices.getUserMedia({ audio: true });

                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioOutputs = devices.filter(device => device.kind === 'audiooutput');

                output.innerHTML = ''; // Clear previous results

                if (audioOutputs.length === 0) {
                    output.innerHTML = '<p>No audio output devices found.</p>';
                    return;
                }

                audioOutputs.forEach((device, index) => {
                    const div = document.createElement('div');
                    div.className = 'device-item';
                    div.innerHTML = `
                        <strong>Device #${index + 1}</strong><br>
                        Name: ${device.label || 'Unknown Device (Permission Required)'}<br>
                        ID: <small>${device.deviceId}</small>
                    `;
                    output.appendChild(div);
                });
            } catch (err) {
                output.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
